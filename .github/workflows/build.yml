name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: pip install buildozer
      - name: Create project
        run: |
          mkdir -p myapp
          cp main.py myapp/
          echo "flet" > myapp/requirements.txt
      - name: Build APK with Buildozer
        run: |
          cd myapp
          buildozer init
          sed -i 's/requirements =/requirements = flet/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = calculadora/' buildozer.spec
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: myapp/bin/*.apk
