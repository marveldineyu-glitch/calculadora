name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Flet
        run: pip install flet
        
      - name: Build APK
        run: |
          flet build apk --project main.py --name Calculadora --org com.marvel
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Calculadora
          path: build/apk/*.apk
